# ============================================
# UR-project – sentral konfigurasjon
# ============================================
# Wildcard /** betyr at alle noder leser disse parametrene.

/**:
  ros__parameters:

    # --- Robot ---
    robot:
      ur_type: "ur5e"
      robot_ip: "143.25.151.38"
      controller: "scaled_joint_trajectory_controller"

    # --- Posisjoner (joint-verdier i radianer) ---
    positions:
      home: [0.1200, -1.5200, 1.0636, -1.2029, -1.0137, -0.7440]
      photo: [0.7803, -1.6176, 1.7140, -1.6939, -1.5707, -0.0140]
      safe_z_offset: 0.10
      search_positions: [
        0.1319, -1.5631,  1.6603, -1.6933, -1.5518, -0.6622,
        -0.2953, -2.0667,  2.0315, -1.5537, -1.5421, -1.0905,
        0.2274, -2.3541,  2.1341, -1.3771, -1.5556, -0.5692
      ]

    # --- Kamera ---
    camera:
      image_topic: "/camera/color/image_raw"
      camera_info_topic: "/camera/color/camera_info"

    # --- Fargedeteksjon (HSV-terskler) ---
    color_thresholds:
      red:
        lower1: [0, 120, 70]
        upper1: [10, 255, 255]
        lower2: [170, 120, 70]
        upper2: [180, 255, 255]
      yellow:
        lower: [20, 100, 100]
        upper: [35, 255, 255]
      blue:
        lower: [100, 150, 50]
        upper: [130, 255, 255]

    # --- Deteksjon ---
    detection:
      min_contour_area: 500
      max_search_attempts: 3

    # --- Debug ---
    debug:
      show_camera: true

    # --- Koordinattransformasjon ---
    calibration:
      calibration_points: [246.0, 61.0, 0.3624, 0.5779, 467.0, 69.0, 0.4490, 0.4930, 457.0, 364.0, 0.3424, 0.3965, 225.0, 388.0, 0.2460, 0.4790]
      table_z: 0.055